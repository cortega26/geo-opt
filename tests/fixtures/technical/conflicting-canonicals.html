<!doctype html>
<html lang="en">
  <head>
    <title>Conflicting canonicals</title>
    <link rel="canonical" href="https://example.com/first" />
    <link rel="canonical" href="https://example.com/second" />
  </head>
  <body>
    <main>
      <h1>Conflicting canonicals</h1>
      <p>Two different canonical URLs are declared.</p>
    </main>
  </body>
</html>
