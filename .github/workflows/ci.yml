name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22, 24]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"

      - name: Install Node dependencies
        run: npm ci

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: ".agents/skills/geo-optimization/scripts/requirements.txt"

      - name: Install Python dependencies
        run: |
          python3 -m pip install --upgrade pip
          pip install -r .agents/skills/geo-optimization/scripts/requirements.txt

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: JS tests
        run: npm test

      - name: Python compatibility tests
        run: python3 .agents/skills/geo-optimization/scripts/test_optimizer.py

      - name: Changelog policy
        if: github.event_name == 'pull_request'
        env:
          GITHUB_BASE_REF: ${{ github.base_ref }}
        run: node scripts/check-changelog.js

      - name: Dogfood — audit own documentation
        run: node bin/cli.js audit docs/ --recursive --threshold 50

      - name: Security audit (advisory only)
        run: npm audit --audit-level=high || true
        continue-on-error: true
